apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-shell
  labels:
    app: calendar-shell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-shell
  template:
    metadata:
      labels:
        app: calendar-shell
    spec:
      serviceAccountName: tmpclaw-project-shell
      containers:
        - name: calendar-shell
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: K8S_NAMESPACE
              value: "tmpclaw"
            - name: TASKMASTER_URL
              value: "http://taskmaster.tmpclaw.svc.cluster.local:8080"
            - name: PORTAL_URL
              value: "http://portal.tmpclaw.svc.cluster.local:3000"
            - name: PROJECT_ID
              value: "5ae245d8-2ed5-446b-9b79-2f885ea282bf"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15
