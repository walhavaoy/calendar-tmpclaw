apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: calendar-shell
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`shell.calendar.tmpclaw.io`) && PathPrefix(`/`)"
      kind: Rule
      middlewares:
        - name: strip-forwarded-user
        - name: forward-auth
      services:
        - name: calendar-shell
          port: 3000
  tls:
    certResolver: letsencrypt
    domains:
      - main: shell.calendar.tmpclaw.io
